<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>S Center Admin</title><link rel="stylesheet" href="style.css"></head>
<body style="background:#171819;min-height:100vh;display:grid;place-items:center;padding:20px;font-family:Inter,sans-serif">
<main style="width:min(520px,100%)">
  <a class="brand" style="color:#fff;margin:0 0 21px 6px" href="index.html"><img style="background:#fff;border-radius:50%" src="assets/s-center-logo.png" alt="S Center"><span>S Center</span></a>
  <section style="background:#fff;border-radius:8px;padding:38px" id="login"><p class="eyebrow">S CENTER / PRIVATE</p><h1 style="margin:0">Admin portal</h1><p style="font-size:13px;color:#777">Sign in to update your catalogue.</p><form id="signin"><label>Email<input type="email" id="email" required></label><label>Password<input type="password" id="password" required></label><button class="button primary">Log in</button><small id="error"></small></form></section>
  <section style="background:#fff;border-radius:8px;padding:38px" id="portal" hidden><div class="dashboard-head"><div><p class="eyebrow">S CENTER / ADMIN</p><h1 style="margin:0">Products</h1></div><button class="button primary" id="add-new">+ Add product</button></div><div id="list"></div><a style="display:block;margin-top:22px;color:#f5821f;font:600 12px Inter;text-decoration:none" href="index.html">← Back to store</a></section>
</main>
<div class="modal" id="editor"><div class="modal-card editor"><button class="close" id="close-editor">×</button><h2 id="title">Add product</h2><form id="edit-form"><label>Name<input id="name" required></label><label>Category<select id="category"><option value="iphone">iPhone</option><option value="android">Android</option><option value="accessory">Accessory</option></select></label><label>Price (IQD)<input id="price" required></label><label>Description<textarea id="description" rows="3" required></textarea></label><label>Image URL<input id="image" required></label><button class="button primary">Save product</button></form></div></div>
<script>
const $=id=>document.getElementById(id);let products=JSON.parse(localStorage.getItem('sCenterProducts')||'[]'),editing=null;
const save=()=>localStorage.setItem('sCenterProducts',JSON.stringify(products));
function render(){ $('list').innerHTML=products.map(p=>'<div class="admin-row"><div><b>'+p.name+'</b><br><small>'+p.category+' • '+p.price+'</small></div><div class="row-buttons"><button data-edit="'+p.id+'">Edit</button><button data-delete="'+p.id+'">Delete</button></div></div>').join('')||'<p>No products saved yet. Open the store once to load the starter catalogue.</p>';document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openEdit(b.dataset.edit));document.querySelectorAll('[data-delete]').forEach(b=>b.onclick=()=>removeProduct(b.dataset.delete));}
$('signin').onsubmit=e=>{e.preventDefault();if($('email').value==='danial77dler@gmail.com'&&$('password').value==='S221133soran$'){$('login').hidden=true;$('portal').hidden=false;render()}else $('error').textContent='Incorrect email or password.'};
$('add-new').onclick=()=>{editing=null;$('edit-form').reset();$('title').textContent='Add product';$('editor').classList.add('open')};$('close-editor').onclick=()=>$('editor').classList.remove('open');
function openEdit(id){editing=id;let p=products.find(p=>p.id===id);$('title').textContent='Edit product';$('name').value=p.name;$('category').value=p.category;$('price').value=p.price;$('description').value=p.description;$('image').value=p.image;$('editor').classList.add('open')}
function removeProduct(id){if(confirm('Delete this product?')){products=products.filter(p=>p.id!==id);save();render()}}
$('edit-form').onsubmit=e=>{e.preventDefault();let p={id:editing||Date.now(),name:$('name').value,category:$('category').value,price:$('price').value,description:$('description').value,image:$('image').value,tag:''};products=editing?products.map(x=>x.id===editing?Object.assign({},x,p):x):products.concat(p);save();render();$('editor').classList.remove('open')};
</script><script src="login-enhancements.js"></script><script src="supabase-config.js"></script><script src="supabase-store.js"></script></body></html>
